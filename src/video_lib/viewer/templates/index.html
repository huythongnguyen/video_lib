<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Compassion - Video Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c1a461;
            --accent: #e5d392;
            --bg-dark: #0f1115;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100-vh;
            overflow-x: hidden;
        }

        /* Abstract background shapes */
        .bg-glow {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(193, 164, 97, 0.1) 0%, rgba(15, 17, 21, 0) 70%);
            z-index: -1;
        }

        .bg-glow-2 {
            position: fixed;
            bottom: -150px;
            left: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(193, 164, 97, 0.05) 0%, rgba(15, 17, 21, 0) 70%);
            z-index: -1;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
            max-width: 800px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .book-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            width: 90%;
            padding: 40px 0;
        }

        .book-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .book-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(193, 164, 97, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .book-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .book-card:hover::before {
            opacity: 1;
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin: 0 0 15px;
            line-height: 1.2;
            z-index: 1;
        }

        .book-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1;
        }

        .icon {
            width: 18px;
            height: 18px;
            fill: var(--primary);
        }

        .action-link {
            margin-top: 20px;
            color: var(--primary);
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            z-index: 1;
        }

        .action-link svg {
            transition: transform 0.3s ease;
        }

        .book-card:hover .action-link svg {
            transform: translateX(5px);
        }

        footer {
            margin-top: auto;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <header>
        <div class="subtitle">Spiritual Wisdom Library</div>
        <h1>Universal Compassion</h1>
    </header>

    <div class="book-container">
        {% for book in sorted_books %}
        <a href="/book/{{ book }}" class="book-card">
            <div>
                <h2 class="book-title">{{ book | replace('_', ' ') | replace('-', ' ') }}</h2>
                <div class="book-meta">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                    <span>Dharma Publication</span>
                </div>
            </div>
            <div class="action-link">
                Explore Library
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </div>
        </a>
        {% endfor %}
    </div>

    <footer>
        &copy; 2026 Universal Compassion Project. All rights reserved.
    </footer>
</body>
</html>
